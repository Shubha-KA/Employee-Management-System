<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <h1>Employee Management System</h1>

    <!-- SEARCH SECTION -->
    <div class="section">
        <h2>Search Employee</h2>
        <div class="search-box">
            <input type="number" id="searchId" placeholder="Search by ID">
            <button onclick="searchById()">Search</button>

            <input type="text" id="searchName" placeholder="Search by Name">
            <button onclick="searchByName()">Search</button>

            <button onclick="fetchEmployees()">Show All</button>
        </div>
    </div>

    <!-- ADD / UPDATE SECTION -->
    <div class="section">
        <h2>Add / Update Employee</h2>

        <div class="form-vertical">
            <label>Name</label>
            <input type="text" id="name">

            <label>Email</label>
            <input type="email" id="email">

            <label>Salary</label>
            <input type="number" id="salary">

            <div class="btn-group">
                <button class="add-btn" onclick="addEmployee()">Add Employee</button>
                <button class="update-btn" onclick="updateEmployee()">Update Employee</button>
            </div>
        </div>
    </div>

    <!-- EMPLOYEE LIST -->
    <div class="section">
        <h2>Employee List</h2>
        <div id="employeeList"></div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="script.js"></script>
</body>
</html>
